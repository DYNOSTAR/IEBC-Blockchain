version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voting-postgres
    environment:
      POSTGRES_USER: voting_user
      POSTGRES_PASSWORD: voting_pass123
      POSTGRES_DB: voting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
